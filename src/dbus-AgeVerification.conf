<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN" "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
	<policy context="default">
		<allow own="com.example.AgeVerification"/>
		<allow send_destination="com.example.AgeVerification"/>
		<allow receive_sender="com.example.AgeVerification"/>
	</policy>
</busconfig>
